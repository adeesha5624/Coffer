name: my_wallet
description: "A new Flutter project for personal finance management."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: "^3.11.0"

dependencies:
  flutter:
    sdk: flutter
  pdf: ^3.10.8
  path_provider: ^2.1.3
  open_file: ^3.3.2
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  google_sign_in: ^7.0.0
  # Icons
  cupertino_icons: ^1.0.8

  # PIN & Local Storage
  shared_preferences: ^2.5.3
  crypto: ^3.0.6

  # Database & Storage
  sqflite: ^2.4.1
  path: ^1.9.1

  # Charts & UI
  fl_chart: ^1.2.0
  intl: ^0.20.2

  # PDF & Printing

  printing: ^5.11.0

  # Media & Files
  image_picker: ^1.2.2
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # පින්තූර හෝ Assets භාවිතා කරනවා නම් මේ පල්ලෙහායින් ඇඩ් කරන්න
